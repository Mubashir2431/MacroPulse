<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macropulse - Quant Stock Signals</title>
    <script>
        try {
            const prefs = JSON.parse(localStorage.getItem("macropulsePreferences") || "{}");
            document.documentElement.setAttribute("data-theme", prefs.theme || "dark");
        } catch {
            document.documentElement.setAttribute("data-theme", "dark");
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fa-solid fa-chart-line"></i>
                Macropulse
            </a>
            <div class="navbar-links">
                <a href="index.html" class="active">Dashboard</a>
                <a href="settings.html">Settings</a>
                <a href="settings.html" class="profile-button" data-profile-button aria-label="Open settings">
                    <span class="profile-avatar">
                        <img data-profile-image alt="Profile picture" hidden>
                        <span data-profile-initials>G</span>
                    </span>
                    <span data-profile-status>Sign in</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Search Section -->
    <section class="search-section">
        <div class="container">
            <h1>Quantitative Stock Signals</h1>
            <p>Advanced multi-strategy analysis for smarter trading decisions</p>

            <div class="search-wrapper">
                <div class="search-input-group">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search by ticker or company name (e.g. AAPL, Tesla)"
                        autocomplete="off"
                    >
                </div>
                <div class="search-results-dropdown" id="search-dropdown">
                    <!-- Results injected by JS -->
                </div>
            </div>
        </div>
    </section>

    <!-- Trending Stocks -->
     <section class="container">
        <div class="section-title">
            <i class="fa-solid fa-fire-flame-curved"></i>
            <span>Trending Stocks</span>
        </div>
        <div class="stocks-grid" id="trending-grid">
            <div class="loading-spinner" id="trending-loading">
                <i class="fa-solid fa-spinner"></i>
                <span>Loading trending stocks...</span>
            </div>
        </div>
    </section>

    <!-- Webpage -->
    <!-- Watchlist -->
    <section class="container">
        <div class="section-title">
            <i class="fa-solid fa-bookmark"></i>
            <span>Popular Tickers</span>
        </div>
        <div class="stocks-grid" id="watchlist-grid">
            <!-- Populated by JS -->
        </div>
<!-- Yash Patel, 04/10,2026
 Added "Saved Stocks title with star icon"-->
        <div class="section-title saved-stocks-title">
            <i class="fa-solid fa-star"></i>
            <span>Saved Stocks</span>
        </div>
        <div class="stocks-grid" id="saved-stocks-grid">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            Macropulse &mdash; Quantitative stock signals powered by advanced strategies.
            Not financial advice.
        </div>
    </footer>

    

    <script src="js/api.js"></script>
    <script src="js/preferences.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
